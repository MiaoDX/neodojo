name: gvhmr-self-hosted-gpu

on:
  workflow_dispatch:
    inputs:
      gpu_input_archive_path:
        description: "Path on the self-hosted GPU runner to neodojo-gvhmr-gpu-input.tar.gz"
        required: false
        default: ""
        type: string
      gvhmr_operator_package_path:
        description: "Optional path on the self-hosted GPU runner to a GVHMR operator package directory or manifest.json"
        required: false
        default: ""
        type: string
      gvhmr_repo:
        description: "Path to an existing GVHMR checkout, or install destination when install_gvhmr is true"
        required: true
        default: "/opt/GVHMR"
        type: string
      smplx_model_dir:
        description: "Path to licensed local SMPL-X model assets on the GPU runner"
        required: true
        type: string
      output_root:
        description: "Optional GVHMR output root on the GPU runner"
        required: false
        default: ""
        type: string
      hmr4d_results:
        description: "Existing hmr4d_results.pt path when skip_gvhmr is true"
        required: false
        default: ""
        type: string
      parameter_block:
        description: "GVHMR SMPL-X parameter block to export"
        required: true
        default: "smpl_params_global"
        type: choice
        options:
          - smpl_params_global
          - smpl_params_incam
      install_gvhmr:
        description: "Clone/install GVHMR into gvhmr_repo before running"
        required: true
        default: false
        type: boolean
      skip_gvhmr:
        description: "Skip GVHMR inference and export from an existing hmr4d_results.pt"
        required: true
        default: false
        type: boolean
      static_cam:
        description: "Pass static-camera mode to GVHMR"
        required: true
        default: true
        type: boolean
      use_dpvo:
        description: "Pass --use_dpvo to GVHMR"
        required: true
        default: false
        type: boolean
      upload_neodojo_export:
        description: "Upload only gvhmr-smplx-joints.json as a short-lived GitHub artifact"
        required: true
        default: false
        type: boolean
      upload_real_demo:
        description: "Upload generated real-demo manifests/public-demo/capture artifacts after intake"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run-gvhmr:
    runs-on: [self-hosted, gpu]
    timeout-minutes: 360
    env:
      GPU_INPUT_ARCHIVE_PATH: ${{ inputs.gpu_input_archive_path }}
      GVHMR_OPERATOR_PACKAGE_PATH: ${{ inputs.gvhmr_operator_package_path }}
      GVHMR_REPO_INPUT: ${{ inputs.gvhmr_repo }}
      SMPLX_MODEL_DIR_INPUT: ${{ inputs.smplx_model_dir }}
      OUTPUT_ROOT_INPUT: ${{ inputs.output_root }}
      HMR4D_RESULTS_INPUT: ${{ inputs.hmr4d_results }}
      PARAMETER_BLOCK_INPUT: ${{ inputs.parameter_block }}
      INSTALL_GVHMR_INPUT: ${{ inputs.install_gvhmr }}
      SKIP_GVHMR_INPUT: ${{ inputs.skip_gvhmr }}
      STATIC_CAM_INPUT: ${{ inputs.static_cam }}
      USE_DPVO_INPUT: ${{ inputs.use_dpvo }}
    steps:
      - uses: actions/checkout@v6

      - name: Unpack neodojo GPU input archive
        shell: bash
        run: |
          set -euo pipefail
          archive="$GPU_INPUT_ARCHIVE_PATH"
          package="$GVHMR_OPERATOR_PACKAGE_PATH"
          python_bin="${PYTHON:-}"
          if [[ -z "$python_bin" ]]; then
            if command -v python3 >/dev/null 2>&1; then
              python_bin=python3
            else
              python_bin=python
            fi
          fi
          if [[ -n "$package" ]]; then
            package_dir="$package"
            if [[ -f "$package" ]]; then
              package_dir="$(dirname "$package")"
            fi
            if [[ ! -d "$package_dir" ]]; then
              echo "::error::gvhmr_operator_package_path must point to a package directory or manifest.json: $package" >&2
              exit 2
            fi
            test -f "$package_dir/manifest.json"
            test -f "$package_dir/request/manifest.json"
            test -f "$package_dir/request/README.md"
            test -f "$package_dir/colab/manifest.json"
            test -f "$package_dir/colab/gvhmr-colab-operator.ipynb"
            archive="$package_dir/archive/neodojo-gvhmr-gpu-input.tar.gz"
            PACKAGE_DIR="$package_dir" ARCHIVE="$archive" "$python_bin" - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path


          def fail(message: str) -> None:
              raise SystemExit(f"::error::{message}")


          def load_json(path: Path) -> dict:
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  fail(f"failed to read {path}: {exc}")
              if not isinstance(payload, dict):
                  fail(f"{path} must contain a JSON object")
              return payload


          def sha256(path: Path) -> str:
              digest = hashlib.sha256()
              with path.open("rb") as handle:
                  for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                      digest.update(chunk)
              return digest.hexdigest()


          def require_schema(payload: dict, expected: str, label: str) -> None:
              actual = payload.get("schema")
              if actual != expected:
                  fail(f"{label} schema mismatch: expected {expected}, got {actual}")


          package_dir = Path(os.environ["PACKAGE_DIR"])
          archive = Path(os.environ["ARCHIVE"])
          package_manifest = load_json(package_dir / "manifest.json")
          request_manifest = load_json(package_dir / "request" / "manifest.json")
          colab_manifest = load_json(package_dir / "colab" / "manifest.json")
          notebook = package_dir / "colab" / "gvhmr-colab-operator.ipynb"
          require_schema(package_manifest, "neodojo.gvhmr_operator_package.v1", "operator package")
          require_schema(request_manifest, "neodojo.gvhmr_gpu_run_request.v1", "run request")
          require_schema(colab_manifest, "neodojo.gvhmr_colab_operator_notebook.v1", "Colab notebook manifest")
          if not archive.is_file():
              fail(f"operator package archive does not exist: {archive}")
          archive_sha = sha256(archive)
          if package_manifest.get("archive", {}).get("sha256") != archive_sha:
              fail("operator package archive checksum does not match manifest")
          if request_manifest.get("archive", {}).get("sha256") != archive_sha:
              fail("run request archive checksum does not match package archive")
          if colab_manifest.get("archive", {}).get("sha256") != archive_sha:
              fail("Colab notebook archive checksum does not match package archive")
          if package_manifest.get("run_request", {}).get("sha256") != sha256(package_dir / "request" / "manifest.json"):
              fail("operator package run-request checksum does not match copied request manifest")
          if colab_manifest.get("gpu_run_request", {}).get("sha256") != sha256(package_dir / "request" / "manifest.json"):
              fail("Colab notebook manifest does not match copied request manifest")
          if colab_manifest.get("notebook", {}).get("sha256") != sha256(notebook):
              fail("Colab notebook checksum does not match manifest")
          print("validated GVHMR operator package manifest and checksums")
          PY
          fi
          if [[ -z "$archive" ]]; then
            echo "::error::Provide gpu_input_archive_path or gvhmr_operator_package_path" >&2
            exit 2
          fi
          if [[ ! -f "$archive" ]]; then
            echo "::error::GVHMR GPU input archive does not exist on this self-hosted runner: $archive" >&2
            exit 2
          fi
          case "$archive" in
            *.tar.gz) ;;
            *)
              echo "::error::gpu_input_archive_path must point to a .tar.gz archive" >&2
              exit 2
              ;;
          esac

          rm -rf outputs/self-hosted-gvhmr-run
          mkdir -p outputs/self-hosted-gvhmr-run
          tar -xzf "$archive" -C outputs/self-hosted-gvhmr-run
          test -f outputs/self-hosted-gvhmr-run/manifest.json
          test -f outputs/self-hosted-gvhmr-run/RUN_ON_GPU.md
          test -f outputs/self-hosted-gvhmr-run/run_gvhmr_neodojo.sh
          test -f outputs/self-hosted-gvhmr-run/export_neodojo_gvhmr.py
          test -f outputs/self-hosted-gvhmr-run/gvhmr-smplx-joints.template.json
          test -f outputs/self-hosted-gvhmr-run/source-materialization.json
          chmod +x outputs/self-hosted-gvhmr-run/run_gvhmr_neodojo.sh

      - name: Run GVHMR wrapper on self-hosted GPU
        shell: bash
        run: |
          set -euo pipefail
          cd outputs/self-hosted-gvhmr-run

          export GVHMR_REPO="$GVHMR_REPO_INPUT"
          export SMPLX_MODEL_DIR="$SMPLX_MODEL_DIR_INPUT"
          export PARAMETER_BLOCK="$PARAMETER_BLOCK_INPUT"
          export STATIC_CAM=0
          export USE_DPVO=0
          if [[ "$STATIC_CAM_INPUT" == "true" ]]; then
            export STATIC_CAM=1
          fi
          if [[ "$USE_DPVO_INPUT" == "true" ]]; then
            export USE_DPVO=1
          fi
          if [[ -n "$OUTPUT_ROOT_INPUT" ]]; then
            export OUTPUT_ROOT="$OUTPUT_ROOT_INPUT"
          fi
          if [[ "$SKIP_GVHMR_INPUT" == "true" ]]; then
            if [[ -z "$HMR4D_RESULTS_INPUT" ]]; then
              echo "::error::hmr4d_results is required when skip_gvhmr is true" >&2
              exit 2
            fi
            export HMR4D_RESULTS="$HMR4D_RESULTS_INPUT"
          fi

          args=()
          if [[ "$INSTALL_GVHMR_INPUT" == "true" ]]; then
            args+=(--install)
          fi
          if [[ "$SKIP_GVHMR_INPUT" == "true" ]]; then
            args+=(--skip-gvhmr)
          fi

          ./run_gvhmr_neodojo.sh "${args[@]}"
          test -f gvhmr-smplx-joints.json

      - name: Validate returned artifact through neodojo
        shell: bash
        run: |
          set -euo pipefail
          python_bin="${PYTHON:-}"
          if [[ -z "$python_bin" ]]; then
            if command -v python3 >/dev/null 2>&1; then
              python_bin=python3
            else
              python_bin=python
            fi
          fi
          "$python_bin" -m pip install -e .
          make real-artifact-intake \
            REAL_ARTIFACT_SOURCE_MATERIALIZATION=outputs/self-hosted-gvhmr-run/source-materialization.json \
            REAL_ARTIFACT_GVHMR_JSON=outputs/self-hosted-gvhmr-run/gvhmr-smplx-joints.json \
            REAL_ARTIFACT_OUT=outputs/self-hosted-real-demo
          PYTHONPATH=src "$python_bin" -m neodojo real-conversion audit-completion \
            --source-materialization outputs/self-hosted-gvhmr-run/source-materialization.json \
            --gvhmr-json outputs/self-hosted-gvhmr-run/gvhmr-smplx-joints.json \
            --real-demo outputs/self-hosted-real-demo \
            --out outputs/self-hosted-real-audit \
            --require-complete

      - name: Upload returned neodojo export
        if: ${{ inputs.upload_neodojo_export }}
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gvhmr-smplx-joints
          path: outputs/self-hosted-gvhmr-run/gvhmr-smplx-joints.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload validated real-demo artifacts
        if: ${{ inputs.upload_real_demo }}
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-self-hosted-real-demo
          path: |
            outputs/self-hosted-real-demo/manifest.json
            outputs/self-hosted-real-demo/real-conversion-validation/source-validation.json
            outputs/self-hosted-real-demo/public-demo/manifest.json
            outputs/self-hosted-real-demo/public-demo/index.html
            outputs/self-hosted-real-demo/public-demo/scene.json
            outputs/self-hosted-real-demo/public-demo/neodojo-demo.rrd
            outputs/self-hosted-real-demo/public-demo/screenshot.svg
            outputs/self-hosted-real-demo/capture/manifest.json
            outputs/self-hosted-real-audit/manifest.json
          if-no-files-found: error
          retention-days: 7
