name: promote-real-demo-pages

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "GitHub Actions run ID containing the neodojo-self-hosted-real-demo artifact"
        required: true
        type: string
      artifact_name:
        description: "Validated real-demo artifact name from the self-hosted GPU workflow"
        required: true
        default: "neodojo-self-hosted-real-demo"
        type: string
      confirm_replace_fixture_pages:
        description: "Confirm replacing the fixture-only Pages artifact with this validated real-demo artifact"
        required: true
        default: false
        type: boolean

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: real-demo-pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    if: ${{ inputs.confirm_replace_fixture_pages && vars.NEODOJO_DEPLOY_REAL_PAGES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Download validated self-hosted real-demo artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact_name }}
          path: outputs/promoted-real-demo-download
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}

      - name: Validate real-demo artifact before Pages promotion
        run: |
          PYTHONPATH=src python -m neodojo real-conversion validate-pages-promotion \
            --download-root outputs/promoted-real-demo-download \
            --source-run-id "${{ inputs.source_run_id }}" \
            --artifact-name "${{ inputs.artifact_name }}" \
            --out outputs/promoted-real-demo-pages

      - name: Public-demo smoke check
        run: PYTHONPATH=src python -m neodojo demo smoke --public-demo outputs/promoted-real-demo-pages

      - name: Upload real-demo Pages artifact
        id: stage
        uses: actions/upload-pages-artifact@v5
        with:
          path: outputs/promoted-real-demo-pages

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages-real-demo
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy validated real demo to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
