name: public-demo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e '.[browser]'
      - name: Syntax lint
        run: make lint
      - name: Project quality checks
        run: make check
      - name: Unit tests
        run: make test
      - name: Build wheel
        run: make build
      - name: Real conversion handoff smoke
        run: make real-handoff-smoke
      - name: Upload real handoff smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-real-handoff-smoke
          path: |
            outputs/real-handoff-smoke/prep/real-conversion-prep.json
            outputs/real-handoff-smoke/source-materialized/source-materialization.json
            outputs/real-handoff-smoke/gpu-handoff/manifest.json
            outputs/real-handoff-smoke/gpu-handoff/README.md
            outputs/real-handoff-smoke/gpu-handoff/source-materialization.json
            outputs/real-handoff-smoke/gpu-handoff/gvhmr-smplx-joints.template.json
            outputs/real-handoff-smoke/gpu-handoff/export_neodojo_gvhmr.py
            outputs/real-handoff-smoke/gpu-handoff/run_gvhmr_neodojo.sh
          if-no-files-found: error
      - name: GPU input bundle smoke
        run: make gpu-input-bundle-smoke
      - name: Upload GPU input bundle smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gpu-input-bundle-smoke
          path: |
            outputs/gvhmr-gpu-input-smoke/manifest.json
            outputs/gvhmr-gpu-input-smoke/RUN_ON_GPU.md
            outputs/gvhmr-gpu-input-smoke/gpu-handoff-manifest.json
            outputs/gvhmr-gpu-input-smoke/source-materialization.json
            outputs/gvhmr-gpu-input-smoke/gvhmr-smplx-joints.template.json
            outputs/gvhmr-gpu-input-smoke/export_neodojo_gvhmr.py
            outputs/gvhmr-gpu-input-smoke/run_gvhmr_neodojo.sh
          if-no-files-found: error
      - name: GPU input archive and run request smoke
        run: make gvhmr-run-request-smoke
      - name: Upload GPU input archive smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gpu-input-archive-smoke
          path: |
            outputs/gvhmr-gpu-input-archive-smoke/manifest.json
            outputs/gvhmr-gpu-input-archive-smoke/neodojo-gvhmr-gpu-input.tar.gz
          if-no-files-found: error
      - name: Upload GPU run request smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gpu-run-request-smoke
          path: |
            outputs/gvhmr-gpu-run-request-smoke/manifest.json
            outputs/gvhmr-gpu-run-request-smoke/README.md
          if-no-files-found: error
      - name: GVHMR Colab operator notebook smoke
        run: make gvhmr-colab-notebook GVHMR_RUN_REQUEST=outputs/gvhmr-gpu-run-request-smoke GVHMR_COLAB_NOTEBOOK_OUT=outputs/gvhmr-colab-operator-smoke
      - name: Upload GVHMR Colab operator notebook smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gvhmr-colab-operator-smoke
          path: |
            outputs/gvhmr-colab-operator-smoke/manifest.json
            outputs/gvhmr-colab-operator-smoke/gvhmr-colab-operator.ipynb
          if-no-files-found: error
      - name: GVHMR operator package smoke and validation
        run: make gvhmr-operator-package-validate-smoke
      - name: Upload GVHMR operator package smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gvhmr-operator-package-smoke
          path: |
            outputs/gvhmr-operator-package-smoke/manifest.json
            outputs/gvhmr-operator-package-smoke/README.md
            outputs/gvhmr-operator-package-smoke/archive/neodojo-gvhmr-gpu-input.tar.gz
            outputs/gvhmr-operator-package-smoke/request/manifest.json
            outputs/gvhmr-operator-package-smoke/request/README.md
            outputs/gvhmr-operator-package-smoke/colab/manifest.json
            outputs/gvhmr-operator-package-smoke/colab/gvhmr-colab-operator.ipynb
          if-no-files-found: error
      - name: GPU execution probe
        run: make gpu-execution-probe
      - name: Upload GPU execution probe artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-gpu-execution-probe
          path: outputs/gvhmr-gpu-execution-probe/manifest.json
          if-no-files-found: error
      - name: Real artifact intake smoke
        run: make real-artifact-intake-smoke
      - name: Upload real artifact intake smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-real-artifact-intake-smoke
          path: |
            outputs/real-artifact-intake-smoke-input/source-materialization.json
            outputs/real-artifact-intake-smoke-input/gvhmr-smplx-joints.json
            outputs/real-artifact-intake-smoke/manifest.json
            outputs/real-artifact-intake-smoke/real-conversion-validation/source-validation.json
            outputs/real-artifact-intake-smoke/public-demo/manifest.json
            outputs/real-artifact-intake-smoke/capture/manifest.json
          if-no-files-found: error
      - name: Real conversion completion audit
        run: make real-conversion-audit
      - name: Upload real conversion audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-real-conversion-audit
          path: |
            outputs/real-conversion-audit/manifest.json
            outputs/real-conversion-audit/gpu-execution-probe/manifest.json
          if-no-files-found: error
      - name: Install browser runtime
        run: python -m playwright install --with-deps chromium
      - name: Build public demo with browser capture
        run: make demo-public-browser
      - name: Upload public demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-public-demo
          path: outputs/public-demo
      - name: Upload browser capture artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-browser-capture
          path: outputs/browser-capture
      - name: Upload capture bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-capture-bundle
          path: |
            outputs/capture
            outputs/public-demo
            outputs/viser-runtime
            outputs/g1-render
            outputs/browser-capture
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: outputs/public-demo

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.NEODOJO_DEPLOY_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
