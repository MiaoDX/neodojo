name: public-demo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e '.[browser]'
      - name: Verify fixture and local real-conversion surface
        run: make verify
      - name: Install MuJoCo CI render runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1 libglx-mesa0 libgl1-mesa-dri
          python -m pip install -e '.[sim]'
      - name: Verify CI MuJoCo G1 render backend
        run: |
          xvfb-run -a env MUJOCO_GL=glfw PYTHONPATH=src python -m unittest \
            tests.test_demo_html.DemoHtmlTests.test_write_mujoco_render_from_registered_mjcf \
            tests.test_demo_html.DemoHtmlTests.test_write_mujoco_render_applies_imported_gmr_joint_angles
      - name: Upload local GPU prep smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-local-gpu-prep-smoke
          path: |
            outputs/real-gpu-prep-smoke/prep/real-conversion-prep.json
            outputs/real-gpu-prep-smoke/source-materialized/source-materialization.json
            outputs/real-gpu-prep-smoke/gpu-run/manifest.json
            outputs/real-gpu-prep-smoke/gpu-run/README.md
            outputs/real-gpu-prep-smoke/gpu-run/source-materialization.json
            outputs/real-gpu-prep-smoke/gpu-run/gvhmr-smplx-joints.template.json
            outputs/real-gpu-prep-smoke/gpu-run/export_neodojo_gvhmr.py
            outputs/real-gpu-prep-smoke/gpu-run/run_gvhmr_neodojo.sh
          if-no-files-found: error
      - name: Upload real artifact intake smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-real-artifact-intake-smoke
          path: |
            outputs/real-artifact-intake-smoke-input/source-materialization.json
            outputs/real-artifact-intake-smoke-input/gvhmr-smplx-joints.json
            outputs/real-artifact-intake-smoke/manifest.json
            outputs/real-artifact-intake-smoke/real-conversion-validation/source-validation.json
            outputs/real-artifact-intake-smoke/public-demo/manifest.json
            outputs/real-artifact-intake-smoke/capture/manifest.json
          if-no-files-found: error
      - name: Upload real conversion audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-real-conversion-audit
          path: outputs/real-conversion-audit/manifest.json
          if-no-files-found: error
      - name: Install browser runtime
        run: python -m playwright install --with-deps chromium
      - name: Build public demo with browser capture
        run: make demo-public-browser
      - name: Upload public demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-public-demo
          path: outputs/public-demo
      - name: Upload browser capture artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-browser-capture
          path: outputs/browser-capture
      - name: Upload capture bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-capture-bundle
          path: |
            outputs/capture
            outputs/public-demo
            outputs/viser-runtime
            outputs/g1-render
            outputs/browser-capture
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: outputs/public-demo

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.NEODOJO_DEPLOY_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
