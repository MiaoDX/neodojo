name: public-demo

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package
        run: python -m pip install -e .
      - name: Syntax lint
        run: make lint
      - name: Project quality checks
        run: make check
      - name: Unit tests
        run: make test
      - name: Build wheel
        run: make build
      - name: Build public demo
        run: make demo-public
      - name: Upload public demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-public-demo
          path: outputs/public-demo
      - name: Upload capture bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: neodojo-capture-bundle
          path: outputs/capture
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: outputs/public-demo

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.NEODOJO_DEPLOY_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
